<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Layout 05 — Four Corners</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400;1,9..144,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="_base.css"/>
  <style>
    body { background-image: none; background-color: var(--bg); }

    /* Full-screen grid layout */
    .screen {
      height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }
    /* Middle zone: 4 quadrants + center hero */
    .mid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 10px;
      padding: 0 12px;
      position: relative;
    }
    /* Hero sits in the middle overlay */
    .hero-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }
    .hero-center h1 {
      font-family:'Fraunces',serif;
      font-size: 36px; line-height:.9;
      letter-spacing:-.02em;
      color: var(--plum);
      text-shadow: 0 0 24px var(--bg), 0 0 12px var(--bg);
    }
    .hero-center h1 em { color:var(--rose);font-style:italic; }
    .hero-center p {
      font-size: 9px; color:rgba(4,4,4,.5);
      margin-top:8px; line-height:1.5;
      font-family:monospace;text-transform:uppercase;letter-spacing:.1em;
      text-shadow: 0 0 16px var(--bg);
    }

    /* Quadrant cards */
    .quad {
      background: white;
      border: 1px solid rgba(0,0,0,.07);
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      padding: 10px;
      position: relative;
      overflow: hidden;
      display: flex; flex-direction: column; justify-content: flex-end;
    }

    /* About — top-left */
    .q-about { background: var(--cream); border-color: rgba(232,224,213,.9); align-items:center;justify-content:center; }

    /* Projects — top-right (small scroll) */
    .q-projects { overflow-y: auto; justify-content: flex-start; gap: 6px; display:flex; flex-direction:column; }

    /* Reviews — bottom-left */
    .q-review { justify-content:flex-start; cursor:pointer; }

    /* Contact — bottom-right */
    .q-contact { justify-content:center; align-items:center; gap:10px; }

    /* Bottom strip */
    .bottom-strip {
      padding: 10px 20px 18px;
      display: flex; justify-content: center;
    }

    /* Small proj items in grid quad */
    .mini-proj { display:flex;align-items:center;gap:6px; }
    .mini-proj img { width:32px;height:32px;object-fit:cover;flex-shrink:0;filter:grayscale(.5); }
    .mini-proj p { font-family:'Fraunces',serif;font-size:9px;color:var(--plum);line-height:1.2; }
    .mini-proj span { font-family:monospace;font-size:6px;text-transform:uppercase;letter-spacing:.15em;color:rgba(4,4,4,.35); }
  </style>
</head>
<body>
<div class="screen">

  <!-- Header -->
  <header class="site-header" style="padding:14px 16px 10px">
    <span class="logo" style="font-size:18px">Mowa.</span>
    <div class="header-icons">
      <a href="mailto:mowaotun2000@gmail.com" class="icon-btn" style="width:30px;height:30px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></a>
      <a href="https://linkedin.com" class="icon-btn" style="width:30px;height:30px" target="_blank"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg></a>
    </div>
  </header>

  <!-- Four quadrants + hero overlay -->
  <div class="mid">
    <!-- Hero centred overlay -->
    <div class="hero-center">
      <h1>Super<br/><em>Product</em><br/>Designer.</h1>
      <p>Thoughts · Work · Design</p>
    </div>

    <!-- TL: About -->
    <div class="quad q-about" style="transform:rotate(-1.5deg)">
      <div class="tape tape-stripe" style="width:40px;top:-6px;left:50%;transform:translateX(-50%)"></div>
      <div class="polaroid" style="transform:rotate(2deg)">
        <img src="../public/mowa.jpeg" onerror="this.src='https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=200&auto=format&fit=crop'" alt="Mowa" style="width:56px;height:56px"/>
      </div>
      <p class="gelica" style="font-size:11px;color:var(--plum);margin-top:8px;text-align:center">Mowa Otun</p>
      <p class="mono" style="font-size:5.5px;text-transform:uppercase;letter-spacing:.18em;color:rgba(4,4,4,.35);text-align:center;margin-top:3px">Product & UX</p>
    </div>

    <!-- TR: Projects -->
    <div class="quad q-projects">
      <div class="tape tape-sky" style="width:36px;top:-6px;right:10px;transform:rotate(2deg)"></div>
      <p class="gelica italic" style="font-size:9px;color:rgba(4,4,4,.4);margin-bottom:6px">projects ✦</p>
      <div class="mini-proj">
        <img src="../public/she.jpg" onerror="this.src='https://images.unsplash.com/photo-1558769132-cb1aea458c5e?q=80&w=100&auto=format&fit=crop'" alt="She"/>
        <div><p>She</p><span>E-Commerce</span></div>
      </div>
      <div class="mini-proj">
        <img src="../public/fox-holistic-care.jpg" onerror="this.src='https://images.unsplash.com/photo-1576091160399-112ba8d25d1f?q=80&w=100&auto=format&fit=crop'" alt="Fox"/>
        <div><p>Fox Holistic</p><span>Mental Health</span></div>
      </div>
      <div class="mini-proj">
        <img src="../public/build-africa-ai.jpg" onerror="this.src='https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=100&auto=format&fit=crop'" alt="Build Africa"/>
        <div><p>Build Africa AI</p><span>AI · Build</span></div>
      </div>
    </div>

    <!-- BL: Review -->
    <div class="quad q-review" data-action="cycle">
      <div class="tape tape-lilac" style="width:36px;top:-6px;left:10px;transform:rotate(-2deg)"></div>
      <span class="stars" style="font-size:9px">★★★★★</span>
      <p class="gelica italic" data-r-quote style="font-size:9px;line-height:1.5;color:rgba(4,4,4,.68);margin:6px 0;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden"></p>
      <div style="display:flex;align-items:center;gap:6px;margin-top:auto">
        <div class="polaroid" style="transform:rotate(-3deg)"><img data-r-photo src="" alt="" style="width:22px;height:22px"/></div>
        <div>
          <p style="font-weight:700;font-size:8.5px;color:var(--plum)" data-r-author></p>
          <p style="font-size:7px;color:rgba(4,4,4,.4)" data-r-role></p>
        </div>
        <button class="nav-btn" data-action="next" style="width:24px;height:24px;margin-left:auto"><svg width="9" height="9" viewBox="0 0 12 12" fill="none"><path d="M4.5 2L8.5 6L4.5 10" stroke="#541388" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>
    </div>

    <!-- BR: Contact -->
    <div class="quad q-contact" style="flex-direction:column">
      <div class="tape tape-rose" style="width:36px;top:-6px;right:10px;transform:rotate(1.5deg)"></div>
      <p class="gelica italic" style="font-size:9px;color:rgba(4,4,4,.4);margin-bottom:10px">reach out ✦</p>
      <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
        <a href="mailto:mowaotun2000@gmail.com" style="text-decoration:none;display:flex;align-items:center;gap:6px">
          <div style="width:30px;height:30px;border-radius:50%;background:white;border:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;color:var(--rose)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></div>
          <span class="mono" style="font-size:7px;text-transform:uppercase;letter-spacing:.1em;color:rgba(4,4,4,.4)">Gmail</span>
        </a>
        <a href="https://linkedin.com" target="_blank" style="text-decoration:none;display:flex;align-items:center;gap:6px">
          <div style="width:30px;height:30px;border-radius:50%;background:white;border:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;color:var(--sky)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg></div>
          <span class="mono" style="font-size:7px;text-transform:uppercase;letter-spacing:.1em;color:rgba(4,4,4,.4)">LinkedIn</span>
        </a>
        <a href="#" style="text-decoration:none;display:flex;align-items:center;gap:6px">
          <div style="width:30px;height:30px;border-radius:50%;background:white;border:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;color:var(--plum)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg></div>
          <span class="mono" style="font-size:7px;text-transform:uppercase;letter-spacing:.1em;color:rgba(4,4,4,.4)">Resume</span>
        </a>
      </div>
    </div>
  </div>

  <!-- Bottom strip -->
  <div class="bottom-strip">
    <p style="font-family:monospace;font-size:7.5px;color:rgba(4,4,4,.28);text-transform:uppercase;letter-spacing:.18em"><a href="index.html" style="color:inherit;text-decoration:none">← all layouts</a></p>
  </div>

</div>
<script src="_review.js"></script>
</body>
</html>
